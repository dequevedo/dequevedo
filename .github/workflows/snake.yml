name: Generate Contribution Graphs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  contrib-3d:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution calendar
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: profile-3d-contrib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  contrib-metrics:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate classic contribution calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: ${{ github.repository_owner }}
          filename: github-metrics-calendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: America/Sao_Paulo

      - name: Generate contribution habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: ${{ github.repository_owner }}
          filename: github-metrics-habits.svg
          base: ""
          plugin_habits: yes
          plugin_habits_days: 30
          plugin_habits_charts: yes
          config_timezone: America/Sao_Paulo

      - name: Move artifacts
        run: |
          mkdir -p dist
          cp /metrics_renders/github-metrics-calendar.svg dist/ 2>/dev/null || cp github-metrics-calendar.svg dist/ 2>/dev/null || true
          cp /metrics_renders/github-metrics-habits.svg dist/ 2>/dev/null || cp github-metrics-habits.svg dist/ 2>/dev/null || true

      - name: Push metrics to output-metrics branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output-metrics
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
